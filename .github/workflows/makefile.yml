name: Build ipwnder
on: [push, workflow_dispatch]
jobs:
  ipwnder-linux:
    strategy:
      matrix:
        arch:
          - runner: ubuntu-22.04
            name: x86_64
          - runner: ubuntu-22.04-arm
            name: aarch64

    name: ipwnder-linux-${{ matrix.arch.name }}
    runs-on: ${{ matrix.arch.runner }}

    steps:
      - uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y aria2 libusb-1.0-0-dev clang lld
          sudo apt remove -y libssl-dev libusb-1.0-0-dev
          
          LIBUSB_TAG=$(curl -s https://api.github.com/repos/libusb/libusb/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          LIBUSB_VER=${LIBUSB_TAG#v}
          
          aria2c https://github.com/libusb/libusb/releases/download/${LIBUSB_TAG}/libusb-${LIBUSB_VER}.tar.bz2
          tar -xf libusb-${LIBUSB_VER}.tar.bz2
          cd libusb-${LIBUSB_VER}
          ./configure --disable-shared --enable-static --disable-udev LDFLAGS="-static"
          make -j$(nproc)
          sudo make install
          cd ..

      - name: Build ipwnder
        run: make -j$(nproc) LDFLAGS="-L/usr/local/lib -fuse-ld=lld" CC=clang LDFLAGS="-L/usr/local/lib /usr/local/lib/libusb-1.0.a -lpthread -ldl"

      - name: Zip ipwnder
        run: zip -r ipwnder_linux-${{ matrix.arch.name }}.zip ipwnder-plus

      - name: Update latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest \
            ipwnder_linux-${{ matrix.arch.name }}.zip \
            --clobber -R ${{ github.repository }}

          gh release edit latest \
            --title "Latest" \
            --target ${{ github.sha }} -R ${{ github.repository }}
  ipwnder-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [arm64, x86_64]
        
    name: ipwnder-macos-${{ matrix.arch }}
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Build libusb
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LIBUSB_TAG=$(gh release view --repo libusb/libusb --json tagName -q .tagName)
          LIBUSB_VER=${LIBUSB_TAG#v}
          curl -LO https://github.com/libusb/libusb/releases/download/${LIBUSB_TAG}/libusb-${LIBUSB_VER}.tar.bz2
          tar -xf libusb-${LIBUSB_VER}.tar.bz2
          cd libusb-${LIBUSB_VER}
          if [ "${{ matrix.arch }}" = "x86_64" ]; then
            ./configure --disable-shared --enable-static \
              --host=x86_64-apple-darwin \
              CC="clang -arch x86_64" \
              --prefix=${{ github.workspace }}/libusb
          else
            ./configure --disable-shared --enable-static \
              --prefix=${{ github.workspace }}/libusb
          fi
          make -j$(sysctl -n hw.logicalcpu)
          make install
          
      - name: Build ipwnder
        run: |
          ARCH_FLAG=""
          if [ "${{ matrix.arch }}" = "x86_64" ]; then ARCH_FLAG="-arch x86_64"; fi
          make -j$(sysctl -n hw.logicalcpu) \
            CC=clang \
            CFLAGS="-DDEBUG -I. -I${{ github.workspace }}/libusb/include -mmacosx-version-min=10.13 $ARCH_FLAG" \
            LDFLAGS="${{ github.workspace }}/libusb/lib/libusb-1.0.a -framework IOKit -framework CoreFoundation -framework Security"
            
      - name: Zip ipwnder
        run: zip ipwnder_macos-${{ matrix.arch }}.zip ipwnder-plus
        
      - name: Update latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload latest \
            ipwnder_macos-${{ matrix.arch }}.zip \
            --clobber -R ${{ github.repository }}
            
          gh release edit latest \
            --title "Latest" \
            --target ${{ github.sha }} -R ${{ github.repository }}
